<svg xmlns="http://www.w3.org/2000/svg" viewBox="-70 -32 140 64" width="140" height="64">
  <title>Dog Body</title>
  <!-- slightly elongated oval body -->
  <ellipse cx="0" cy="0" rx="65" ry="28" fill="#1a1a2e" stroke="#00d9ff" stroke-width="1.5"/>
  <!-- belly tuck -->
  <path d="M-40,22 Q0,30 40,22" fill="none" stroke="#00d9ff" stroke-width="0.8" opacity="0.35"/>
  <!-- spine ridge -->
  <line x1="-62" y1="-12" x2="62" y2="-12" stroke="#00d9ff" stroke-width="0.6" opacity="0.25"/>
  <!-- neck pivot (front) -->
  <circle cx="-62" cy="-14" r="4" fill="#00ffcc" stroke="#0a0a0f" stroke-width="1.5"/>
  <!-- tail pivot (rear) -->
  <circle cx="64" cy="-8" r="4" fill="#00ffcc" stroke="#0a0a0f" stroke-width="1.5"/>
  <!-- front leg L -->
  <circle cx="-38" cy="26" r="4" fill="#0088ff" stroke="#0a0a0f" stroke-width="1.5"/>
  <!-- front leg R -->
  <circle cx="-20" cy="26" r="4" fill="#00ff88" stroke="#0a0a0f" stroke-width="1.5"/>
  <!-- rear leg L -->
  <circle cx="26" cy="26" r="4" fill="#0088ff" stroke="#0a0a0f" stroke-width="1.5"/>
  <!-- rear leg R -->
  <circle cx="44" cy="26" r="4" fill="#00ff88" stroke="#0a0a0f" stroke-width="1.5"/>
</svg>
