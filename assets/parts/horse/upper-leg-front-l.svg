  <!-- muscle highlight -->
  <path d="M-8,-48 Q-10,-20 -8,48" fill="none" stroke="#0055aa" stroke-width="1" opacity="0.5"/>
  <!-- hip pivot -->
  <circle cx="0" cy="-48" r="4" fill="#0088ff" stroke="#0a0a0f" stroke-width="1.5"/>
  <!-- knee pivot -->
  <circle cx="0" cy="48" r="4" fill="#0088ff" stroke="#0a0a0f" stroke-width="1.5"/>
</svg>
