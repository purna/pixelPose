<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -70 100 90" width="100" height="90">
  <title>Horse Head</title>
  <!-- long muzzle / snout -->
  <path d="M10,-60 Q60,-55 65,-30 Q68,-10 55,10 L20,12 Q10,8 8,-10 Q-5,-20 0,-50 Z" fill="#1a2a1a" stroke="#00ff88" stroke-width="1.5"/>
  <!-- nostril L -->
  <ellipse cx="50" cy="2" rx="5" ry="3" fill="#001a00" stroke="#00ff88" stroke-width="1"/>
  <!-- nostril R -->
  <ellipse cx="62" cy="0" rx="5" ry="3" fill="#001a00" stroke="#00ff88" stroke-width="1"/>
  <!-- eye -->
  <ellipse cx="20" cy="-35" rx="7" ry="6" fill="#001a00" stroke="#00ff88" stroke-width="1.2"/>
  <circle cx="20" cy="-35" r="3" fill="#00ff88"/>
  <circle cx="21" cy="-36" r="1.2" fill="#e0ffe8"/>
  <!-- ear -->
  <path d="M12,-60 L18,-78 L26,-60 Z" fill="#1a2a1a" stroke="#00ff88" stroke-width="1.2"/>
  <!-- mane hint -->
  <path d="M0,-58 Q-8,-45 -5,-30 Q-8,-15 -4,0" fill="none" stroke="#00cc66" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- neck pivot -->
  <circle cx="-4" cy="5" r="4" fill="#00ffcc" stroke="#0a0a0f" stroke-width="1.5"/>
</svg>
